<!-- Page header -->
<app-header [config]="headerConfig"></app-header>

<!-- Content -->
<div class="full-box tile-container">

    @for(menuItem of menuItems; track menuItem.name) {
        <a [routerLink]="menuItem.url" class="tile">
            <div class="tile-tittle">{{menuItem.title}}</div>
            <div class="tile-icon">
                <i [class]="menuItem.icon"></i>
                <p>{{menuItem.description}}</p>
            </div>
        </a>
    }
    
</div>

<!-- Analytics Charts Section -->
<div class="container-fluid" style="margin-top: 30px; margin-bottom: 50px;">
    <div class="row">
        <!-- Line Chart: Trabajos Recientes -->
        <div class="col-12 col-lg-8 mb-4">
            <div class="card" style="box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; border-radius: 8px; background: #FFF;">
                <div class="card-body" style="padding: 20px;">
                    <h5 style="margin-bottom: 20px; font-weight: 600; color: #333; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px;">
                        <i class="fas fa-chart-line" style="color: var(--color-three); margin-right: 8px;"></i>Tendencia de Trabajos (Últimos 15 días)
                    </h5>
                    <div id="trendsChart" style="width: 100%; height: 350px;"></div>
                </div>
            </div>
        </div>
        
        <!-- Pie Chart: Trabajos por Estado -->
        <div class="col-12 col-lg-4 mb-4">
            <div class="card" style="box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; border-radius: 8px; background: #FFF;">
                <div class="card-body" style="padding: 20px;">
                    <h5 style="margin-bottom: 20px; font-weight: 600; color: #333; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px;">
                        <i class="fas fa-chart-pie" style="color: var(--color-three); margin-right: 8px;"></i>Distribución por Estado
                    </h5>
                    <div id="statesChart" style="width: 100%; height: 350px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

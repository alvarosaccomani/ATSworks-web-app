<nav class="navbar-info-container">
    <div class="navbar-left">
    @if(!isCustomer) {
        <a class="nav-icon-btn" (click)="showCloseNavBar()" title="Menú">
            <i class="fas fa-bars"></i>
        </a>
    }
    </div>

    <div class="navbar-right">
        @if(userRolesCompany) {
            <div class="company-selector-wrapper">
                <i class="fas fa-building select-icon"></i>
                <nz-select 
                    class="select-rol-modern" 
                    [(ngModel)]="selectedCompany"
                    (ngModelChange)="onCompanyChange($event)"
                    nzShowSearch
                    nzBorderless
                    [nzPlaceHolder]="'Seleccionar Empresa'">
                    @for(userRolCompany of userRolesCompany; track userRolCompany.rol_uuid) {
                        @if(userRolCompany){
                            <nz-option [nzValue]="userRolCompany.cmp_uuid" [nzLabel]="userRolCompany.cmp_name"></nz-option>
                        }
                    }
                </nz-select>
            </div>
        }

        @if(hasMultipleContexts) {
            <div class="context-switcher">
                @if(currentContext === 'admin') {
                    <a class="nav-icon-btn switcher-btn" routerLink="/customer/customer-works" title="Cambiar a Vista Cliente">
                        <i class="fas fa-user-tag"></i>
                        <span class="switcher-text">Vista Cliente</span>
                    </a>
                } @else {
                    <a class="nav-icon-btn switcher-btn" routerLink="/admin/user/dashboard" title="Cambiar a Vista Admin">
                        <i class="fas fa-user-shield"></i>
                        <span class="switcher-text">Vista Admin</span>
                    </a>
                }
            </div>
        }

        <div class="nav-actions">
            <a class="nav-icon-btn" 
               [routerLink]="isCustomer && !hasAdminRole() ? ['/customer/user'] : ['/admin/application/user', identity.usr_uuid]" 
               title="Configuración">
                <i class="fas fa-user-cog"></i>
            </a>
            <a href="#" class="nav-icon-btn btn-exit-system logout-btn" title="Cerrar Sesión">
                <i class="fas fa-power-off"></i>
            </a>
        </div>
    </div>
</nav>

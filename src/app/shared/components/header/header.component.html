<div class="header-container">
    <div class="header-content">
        <div class="header-icon-wrapper">
            <i [class]="config.icon" class="header-icon"></i>
        </div>
        <div class="header-info">
            <h3 class="header-title">{{config.title}}</h3>
            <p class="header-subtitle">
                {{config.description}}
            </p>
        </div>
    </div>
</div>
